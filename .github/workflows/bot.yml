name: تشغيل بوت التحميل

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: تثبيت المتطلبات
        run: |
          pip install -r requirements.txt
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: تشغيل البوت
        id: run_bot
        continue-on-error: true
        run: python src/bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: حفظ الحالة
        run: |
          git config user.name "telegram-bot"
          git config user.email "bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add state.json
          if git diff --staged --quiet; then echo "لا توجد تغييرات"; else git commit -m "تحديث حالة البوت [skip ci]" && git push; fi
